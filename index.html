<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir Pintar v1.0.0</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    
    <style>
        /* --- CSS Variables untuk Tema --- */
        :root {
            /* Light Theme */
            --bg-color: #f4f6f8;
            --surface-color: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #4338ca;
            --primary-hover: #3730a3;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e2e8f0;
            --btn-bg: #edf2f7;
            --btn-text: #2d3748;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #34d399;
            --danger: #f87171;
            --border: #374151;
            --btn-bg: #374151;
            --btn-text: #f3f4f6;
        }

        /* --- Reset & Base Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            justify-content: center;
        }

        /* Container Mobile */
        .app-container {
            width: 100%;
            max-width: 480px; /* Ukuran maksimal untuk tampilan mobile */
            min-height: 100vh;
            background-color: var(--surface-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .header-title h1 {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .header-title span {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-main);
        }

        /* --- Main Content --- */
        main {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Input Besar */
        .input-large {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 16px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 12px;
            text-align: right;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-large:focus {
            border-color: var(--primary);
        }

        /* Metode Pembayaran (Radio Buttons bergaya Box) */
        .payment-methods {
            display: flex;
            gap: 10px;
        }

        .payment-methods input[type="radio"] {
            display: none;
        }

        .payment-label {
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .payment-methods input[type="radio"]:checked + .payment-label {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary-hover);
        }

        /* Grid Tombol Pintasan Nominal */
        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .btn-quick {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 12px 0;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-quick:active {
            background-color: var(--border);
        }

        .btn-pas {
            grid-column: span 3;
            background-color: var(--primary);
            color: white;
        }

        .btn-pas:active {
            background-color: var(--primary-hover);
        }

        /* --- Footer / Result Section --- */
        .summary-section {
            padding: 20px;
            background-color: var(--bg-color);
            border-top: 1px solid var(--border);
            border-radius: 16px 16px 0 0;
            margin-top: auto;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .summary-row.total {
            font-size: 1.25rem;
            font-weight: bold;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--border);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-lunas { background-color: var(--success); color: white; }
        .status-kurang { background-color: var(--danger); color: white; }
        .status-netral { background-color: var(--text-muted); color: white; }

        .btn-reset {
            width: 100%;
            padding: 16px;
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-title">
                <h1>Kasir Pintar</h1>
                <span>v1.0.0</span>
            </div>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️</button>
        </header>

        <main>
            <div class="form-group">
                <label>Total Belanja</label>
                <input type="text" id="totalBelanja" class="input-large" inputmode="numeric" placeholder="0" oninput="formatInput(this); calculate()">
            </div>

            <div class="form-group">
                <label>Metode Pembayaran</label>
                <div class="payment-methods">
                    <input type="radio" id="payTunai" name="payment" value="Tunai" checked onchange="handlePaymentChange()">
                    <label for="payTunai" class="payment-label">Tunai</label>

                    <input type="radio" id="payQris" name="payment" value="QRIS" onchange="handlePaymentChange()">
                    <label for="payQris" class="payment-label">QRIS/Debit</label>

                    <input type="radio" id="paySplit" name="payment" value="Split" onchange="handlePaymentChange()">
                    <label for="paySplit" class="payment-label">Split</label>
                </div>
            </div>

            <div class="form-group">
                <label>Uang Diterima</label>
                <input type="text" id="uangDiterima" class="input-large" inputmode="numeric" placeholder="0" oninput="formatInput(this); calculate()">
                
                <div class="quick-amounts">
                    <button class="btn-quick btn-pas" onclick="setQuickAmount('pas')">Uang Pas</button>
                    <button class="btn-quick" onclick="setQuickAmount(5000)">5K</button>
                    <button class="btn-quick" onclick="setQuickAmount(10000)">10K</button>
                    <button class="btn-quick" onclick="setQuickAmount(20000)">20K</button>
                    <button class="btn-quick" onclick="setQuickAmount(50000)">50K</button>
                    <button class="btn-quick" onclick="setQuickAmount(75000)">75K</button>
                    <button class="btn-quick" onclick="setQuickAmount(100000)">100K</button>
                </div>
            </div>
        </main>

        <div class="summary-section">
            <div class="summary-row">
                <span>Status</span>
                <span id="statusBadge" class="status-badge status-netral">-</span>
            </div>
            <div class="summary-row total">
                <span id="labelKembalian">Kembalian</span>
                <span id="nilaiKembalian">Rp 0</span>
            </div>
            <button class="btn-reset" onclick="resetForm()">Reset Transaksi</button>
        </div>
    </div>

    <script>
        // --- Tema Setup ---
        const html = document.documentElement;
        const themeToggleBtn = document.getElementById('themeToggle');
        
        // Cek LocalStorage untuk tema yang tersimpan
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        function toggleTheme() {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            themeToggleBtn.innerText = theme === 'dark' ? '☀️' : '🌙';
        }

        // --- Logika Kasir ---
        const inputTotal = document.getElementById('totalBelanja');
        const inputTerima = document.getElementById('uangDiterima');
        const labelKembalian = document.getElementById('labelKembalian');
        const nilaiKembalian = document.getElementById('nilaiKembalian');
        const statusBadge = document.getElementById('statusBadge');

        // Format angka ke format ribuan (Rupiah) tanpa desimal saat diketik
        function formatInput(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            if (value !== '') {
                input.value = parseInt(value, 10).toLocaleString('id-ID');
            } else {
                input.value = '';
            }
        }

        // Dapatkan angka asli (integer) dari input string
        function getRawValue(str) {
            if (!str) return 0;
            return parseInt(str.replace(/[^0-9]/g, ''), 10) || 0;
        }

        // Jika QRIS dipilih, otomatis uang diterima sama dengan total belanja (Uang Pas)
        function handlePaymentChange() {
            const method = document.querySelector('input[name="payment"]:checked').value;
            if (method === 'QRIS') {
                setQuickAmount('pas');
            }
        }

        // Tombol Nominal Pintasan
        function setQuickAmount(amount) {
            let total = getRawValue(inputTotal.value);
            
            if (amount === 'pas') {
                inputTerima.value = total.toLocaleString('id-ID');
            } else {
                inputTerima.value = amount.toLocaleString('id-ID');
            }
            calculate();
        }

        // Kalkulasi Kembalian & Status
        function calculate() {
            const total = getRawValue(inputTotal.value);
            const terima = getRawValue(inputTerima.value);
            
            if (total === 0 && terima === 0) {
                resetSummary();
                return;
            }

            const selisih = terima - total;

            if (selisih >= 0) {
                labelKembalian.innerText = "Kembalian";
                nilaiKembalian.innerText = "Rp " + selisih.toLocaleString('id-ID');
                statusBadge.innerText = "LUNAS";
                statusBadge.className = "status-badge status-lunas";
            } else {
                labelKembalian.innerText = "Kurang";
                // Menampilkan nominal kurang (diubah jadi positif untuk tampilan)
                nilaiKembalian.innerText = "Rp " + Math.abs(selisih).toLocaleString('id-ID');
                statusBadge.innerText = "BELUM LUNAS";
                statusBadge.className = "status-badge status-kurang";
            }
        }

        function resetSummary() {
            labelKembalian.innerText = "Kembalian";
            nilaiKembalian.innerText = "Rp 0";
            statusBadge.innerText = "-";
            statusBadge.className = "status-badge status-netral";
        }

        // Reset semua form
        function resetForm() {
            inputTotal.value = '';
            inputTerima.value = '';
            document.getElementById('payTunai').checked = true;
            resetSummary();
        }
    </script>
</body>
</html>
