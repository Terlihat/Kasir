<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir Pintar Pro v1.5.1</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    
    <style>
        /* --- CSS Variables (Eye-Care Soft Palette) --- */
        :root {
            --bg-color: #f0f4f8;
            --surface-color: #ffffff;
            --modal-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --primary: #3b82f6;      /* Biru yang lebih lembut */
            --primary-hover: #2563eb;
            --success: #10b981;      /* Hijau yang lebih kalem */
            --danger: #ef4444;
            --border: #e2e8f0;
            --btn-bg: #f1f5f9;       /* Warna solid lembut pengganti transparan */
            --btn-text: #475569;
            --status-bg: #f8fafc;
            --card-report-bg: #f8fafc;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --modal-bg: #1e1e1e;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #3b82f6; 
            --primary-hover: #2563eb;
            --success: #10b981; 
            --danger: #ef4444;
            --border: #334155;
            --btn-bg: #2d3748;       /* Warna solid gelap pengganti transparan */
            --btn-text: #e2e8f0;
            --status-bg: #18181b;
            --card-report-bg: #27272a;
        }

        /* --- Reset & UI Polish --- */
        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            transition: background-color 0.3s, color 0.3s; display: flex; justify-content: center;
            overscroll-behavior-y: none; overflow: hidden;
        }

        .app-container {
            width: 100%; max-width: 480px; height: 100vh;
            background-color: var(--surface-color); display: flex; flex-direction: column; position: relative;
        }

        /* --- Header --- */
        header {
            padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
            background-color: var(--surface-color); z-index: 10; flex-shrink: 0;
        }

        .header-title h1 { font-size: 1.1rem; font-weight: 700; }
        .header-title span { font-size: 0.75rem; color: var(--text-muted); }

        .theme-toggle {
            background-color: var(--btn-bg); border: none; font-size: 1.1rem; cursor: pointer;
            color: var(--text-main); width: 36px; height: 36px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; transition: all 0.2s;
        }
        .theme-toggle:active { transform: scale(0.9); }

        /* --- Main Content --- */
        main {
            padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
        }

        .form-group label {
            display: block; font-size: 0.85rem; margin-bottom: 8px; color: var(--text-muted); font-weight: 700; text-transform: uppercase;
        }

        .input-box {
            width: 100%; background-color: var(--status-bg); border: 2px solid transparent;
            color: var(--text-main); padding: 14px 16px; font-size: 1.25rem; font-weight: bold;
            border-radius: 10px; outline: none; transition: all 0.2s;
        }
        .input-box:focus { border-color: var(--primary); background-color: var(--surface-color); }
        .input-box::placeholder { color: var(--text-muted); font-weight: 600; font-size: 1rem; }

        /* --- Payment Options (Soft UI) --- */
        .payment-methods { display: flex; flex-direction: column; gap: 10px; }
        .payment-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .payment-methods input[type="radio"] { display: none; }

        .payment-label {
            text-align: center; padding: 14px 8px; background-color: var(--btn-bg);
            color: var(--btn-text); border: 2px solid transparent; border-radius: 10px;
            font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.2s ease;
        }
        .payment-methods input[type="radio"]:checked + .payment-label {
            background-color: var(--primary); color: #ffffff;
        }

        .split-label { display: flex; justify-content: center; align-items: center; gap: 8px; }

        /* --- Quick Amounts --- */
        .quick-amounts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
        .btn-quick {
            background-color: var(--btn-bg); color: var(--text-main); border: none;
            padding: 12px 0; border-radius: 8px; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s ease;
        }
        .btn-quick:active { transform: scale(0.95); background-color: var(--border); }
        .btn-clear { color: var(--danger); }

        /* --- Summary & Action Buttons --- */
        .summary-section {
            padding: 20px; background-color: var(--surface-color); flex-shrink: 0; padding-bottom: 24px;
        }

        .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .total-label { font-size: 1rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); }
        .total-value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

        .status-box { display: flex; justify-content: space-between; align-items: center; padding: 16px; background-color: var(--status-bg); border-radius: 10px; margin-bottom: 16px;}
        .status-label { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); }
        .status-result { font-size: 1rem; font-weight: 800; text-align: right; }

        .text-green { color: var(--success); }
        .text-red { color: var(--danger); }
        .text-neutral { color: var(--text-muted); }

        .action-buttons { display: flex; flex-direction: column; gap: 10px; }
        .btn-action {
            width: 100%; padding: 16px; border-radius: 10px; font-size: 1rem;
            font-weight: 800; cursor: pointer; border: none; transition: all 0.2s ease;
        }
        .btn-action:active { transform: scale(0.98); }
        
        .btn-save { background-color: var(--success); color: #ffffff; }
        .btn-save:disabled { background-color: var(--btn-bg); color: var(--text-muted); cursor: not-allowed; }
        
        /* Tombol Reset diubah menjadi solid lembut, tidak ada garis tepi transparan lagi */
        .btn-reset { background-color: var(--btn-bg); color: var(--text-muted); }
        .btn-reset:active { background-color: var(--danger); color: #ffffff; }

        /* --- Dashboard Laporan --- */
        .report-section { background-color: var(--surface-color); flex-shrink: 0; }
        .report-header {
            padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; background-color: var(--status-bg); transition: background-color 0.2s;
            border-top-left-radius: 16px; border-top-right-radius: 16px; margin-top: -10px; z-index: 5; position: relative;
        }
        .report-header:active { background-color: var(--btn-bg); }
        .report-title { font-size: 0.95rem; font-weight: 800; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
        .report-toggle-icon { font-size: 0.8rem; color: var(--text-muted); transition: transform 0.3s ease; }
        .report-header.active .report-toggle-icon { transform: rotate(180deg); }

        .report-content {
            display: none; padding: 20px; flex-direction: column; gap: 16px;
            max-height: 45vh; overflow-y: auto; background-color: var(--status-bg);
        }
        .report-content.show { display: flex; }

        .report-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .report-card { background-color: var(--surface-color); padding: 12px; border-radius: 10px; text-align: center; }
        .card-label { display: block; font-size: 0.7rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .card-value { font-size: 0.9rem; font-weight: 800; }

        .history-container { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
        .history-label { font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        
        .history-list { display: flex; flex-direction: column; gap: 8px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background-color: var(--surface-color); border-radius: 8px; }
        
        .item-meta { display: flex; flex-direction: column; gap: 2px; }
        .item-time { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
        .item-method { font-size: 0.75rem; font-weight: 800; color: var(--primary); background-color: var(--btn-bg); padding: 4px 8px; border-radius: 4px; }
        .item-amount { font-weight: 800; font-size: 0.95rem; }

        /* Tombol Hapus Solid Lembut */
        .btn-clear-history {
            background-color: var(--btn-bg); color: var(--text-muted); border: none;
            padding: 14px; font-size: 0.85rem; font-weight: 800; border-radius: 10px;
            cursor: pointer; transition: all 0.2s; margin-top: 8px;
        }
        .btn-clear-history:active { background-color: var(--danger); color: #ffffff; transform: scale(0.98); }

        /* --- Split Payment Modal --- */
        .modal-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content {
            width: 100%; background-color: var(--modal-bg); border-radius: 16px; padding: 24px;
            display: flex; flex-direction: column; gap: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transform: translateY(20px); transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .modal-title { font-weight: 800; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        .modal-title-icon { color: var(--primary); }
        .modal-total { font-weight: 800; font-size: 1.25rem; color: var(--primary); }
        
        .split-box { background-color: var(--status-bg); border-radius: 12px; padding: 16px; }
        .split-box label { font-size: 0.8rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: block;}
        .split-inputs { display: flex; gap: 10px; }
        .split-select { width: 35%; background-color: var(--surface-color); color: var(--text-main); border: none; border-radius: 8px; padding: 12px; font-size: 0.95rem; font-weight: 700; outline: none; }
        .split-input { width: 65%; background-color: var(--surface-color); border: none; color: var(--text-main); padding: 12px 16px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; outline: none; }
        
        .modal-actions { display: flex; gap: 12px; margin-top: 12px; }
        .modal-actions button { flex: 1; padding: 16px; border-radius: 10px; font-weight: 800; font-size: 0.95rem; cursor: pointer; border: none; transition: all 0.2s ease; }
        .btn-modal-cancel { background-color: var(--btn-bg); color: var(--text-main); }
        .btn-modal-cancel:active { transform: scale(0.96); }
        .btn-modal-apply { background-color: var(--primary); color: white; }
        .btn-modal-apply:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-title">
                <h1>Kasir Pintar</h1>
                <span>v1.5.1 (Eye-Care UI)</span>
            </div>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️</button>
        </header>

        <main>
            <div class="form-group">
                <label>Total Belanja</label>
                <input type="text" id="totalBelanja" class="input-box" inputmode="numeric" placeholder="0" oninput="formatInput(this); handleMainInput(); calculate()">
            </div>

            <div class="payment-methods">
                <div class="payment-row">
                    <div>
                        <input type="radio" id="payTunai" name="payment" value="Tunai" checked onchange="handlePaymentChange()">
                        <label for="payTunai" class="payment-label" style="display:block;">Tunai</label>
                    </div>
                    <div>
                        <input type="radio" id="payQris" name="payment" value="QRIS" onchange="handlePaymentChange()">
                        <label for="payQris" class="payment-label" style="display:block;">QRIS/Debit</label>
                    </div>
                </div>
                <div>
                    <input type="radio" id="paySplit" name="payment" value="Split" onchange="handlePaymentChange()">
                    <label for="paySplit" class="payment-label split-label" style="display:flex;">
                        <span style="font-size:1.1rem;">🔀</span> Split Payment
                    </label>
                </div>
            </div>

            <div class="form-group" style="margin-top: 10px;">
                <input type="text" id="uangDiterima" class="input-box" inputmode="numeric" placeholder="Uang Diterima (Rp)" oninput="formatInput(this); handleMainInput(); calculate()">
                
                <div class="quick-amounts">
                    <button class="btn-quick" onclick="setQuickAmount('pas')">Uang Pas</button>
                    <button class="btn-quick" onclick="setQuickAmount(5000)">5K</button>
                    <button class="btn-quick" onclick="setQuickAmount(10000)">10K</button>
                    <button class="btn-quick" onclick="setQuickAmount(20000)">20K</button>
                    <button class="btn-quick" onclick="setQuickAmount(50000)">50K</button>
                    <button class="btn-quick" onclick="setQuickAmount(75000)">75K</button>
                    <button class="btn-quick" onclick="setQuickAmount(100000)">100K</button>
                    <button class="btn-quick btn-clear" onclick="clearTerima()">C</button>
                </div>
            </div>
        </main>

        <div class="summary-section">
            <div class="total-row">
                <span class="total-label">TOTAL</span>
                <span class="total-value" id="displayTotal">Rp 0</span>
            </div>
            <div class="status-box">
                <span class="status-label">Status</span>
                <span class="status-result text-neutral" id="statusResult">-</span>
            </div>
            
            <div class="action-buttons">
                <button class="btn-action btn-save" id="btnSaveTx" onclick="saveTransaction()" disabled>Simpan Transaksi</button>
                <button class="btn-action btn-reset" onclick="resetForm()">Reset Form</button>
            </div>
        </div>

        <div class="report-section">
            <div class="report-header" id="reportHeader" onclick="toggleReportSection()">
                <span class="report-title">📊 Pembukuan Harian</span>
                <span class="report-toggle-icon" id="reportIcon">▲</span>
            </div>
            <div class="report-content" id="reportContent">
                <div class="report-grid">
                    <div class="report-card">
                        <span class="card-label">Omzet</span>
                        <span class="card-value text-green" id="omzetTotal">Rp 0</span>
                    </div>
                    <div class="report-card">
                        <span class="card-label">Kas Tunai</span>
                        <span class="card-value" id="omzetTunai">Rp 0</span>
                    </div>
                    <div class="report-card">
                        <span class="card-label">Uang QRIS</span>
                        <span class="card-value" id="omzetQris">Rp 0</span>
                    </div>
                </div>
                <div class="history-container">
                    <span class="history-label">Riwayat Penjualan</span>
                    <div class="history-list" id="historyList">
                        </div>
                </div>
                <button class="btn-clear-history" onclick="clearHistory()">Hapus Semua Pembukuan</button>
            </div>
        </div>

        <div id="splitModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-title"><span class="modal-title-icon">🔀</span> SPLIT PAYMENT</div>
                    <div class="modal-total" id="modalTotalDisplay">Rp 0</div>
                </div>

                <div class="split-box">
                    <label>Pembayaran Pertama</label>
                    <div class="split-inputs">
                        <select id="splitMethod1" class="split-select">
                            <option value="Tunai">Tunai</option>
                            <option value="QRIS">QRIS</option>
                        </select>
                        <input type="text" id="splitAmount1" class="split-input" inputmode="numeric" placeholder="0" oninput="formatInput(this); syncSplitAmounts(1)">
                    </div>
                </div>

                <div class="split-box">
                    <label>Pembayaran Kedua</label>
                    <div class="split-inputs">
                        <select id="splitMethod2" class="split-select">
                            <option value="QRIS" selected>QRIS</option>
                            <option value="Tunai">Tunai</option>
                        </select>
                        <input type="text" id="splitAmount2" class="split-input" inputmode="numeric" placeholder="0" oninput="formatInput(this); syncSplitAmounts(2)">
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="btn-modal-cancel" onclick="closeSplitModal(true)">Batal</button>
                    <button class="btn-modal-apply" onclick="applySplit()">Terapkan Split</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Tema Setup ---
        const html = document.documentElement;
        const themeToggleBtn = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        function toggleTheme() {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) { themeToggleBtn.innerText = theme === 'dark' ? '☀️' : '🌙'; }

        // --- DOM Elements ---
        const inputTotal = document.getElementById('totalBelanja');
        const inputTerima = document.getElementById('uangDiterima');
        const displayTotal = document.getElementById('displayTotal');
        const statusResult = document.getElementById('statusResult');
        const btnSaveTx = document.getElementById('btnSaveTx');
        
        const modalOverlay = document.getElementById('splitModal');
        const modalTotalDisplay = document.getElementById('modalTotalDisplay');
        const splitAmount1 = document.getElementById('splitAmount1');
        const splitAmount2 = document.getElementById('splitAmount2');
        const splitMethod1 = document.getElementById('splitMethod1');
        const splitMethod2 = document.getElementById('splitMethod2');
        
        const reportHeader = document.getElementById('reportHeader');
        const reportContent = document.getElementById('reportContent');
        const historyList = document.getElementById('historyList');

        // State Global
        let isSplitActive = false;
        let splitData = { m1: '', v1: 0, m2: '', v2: 0 };
        let transactions = JSON.parse(localStorage.getItem('kasir_transactions')) || [];

        updateReportUI();

        // --- Utilities ---
        function formatInput(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            input.value = value !== '' ? parseInt(value, 10).toLocaleString('id-ID') : '';
        }

        function getRawValue(str) { return str ? parseInt(str.replace(/[^0-9]/g, ''), 10) || 0 : 0; }

        // --- Interaksi ---
        function handlePaymentChange() {
            const method = document.querySelector('input[name="payment"]:checked').value;
            if (method === 'Split') { openSplitModal(); } 
            else {
                isSplitActive = false;
                if (method === 'QRIS') setQuickAmount('pas');
                else calculate();
            }
        }

        function handleMainInput() {
            if (isSplitActive) {
                isSplitActive = false;
                document.getElementById('payTunai').checked = true;
            }
        }

        function setQuickAmount(amount) {
            handleMainInput();
            let total = getRawValue(inputTotal.value);
            inputTerima.value = amount === 'pas' ? total.toLocaleString('id-ID') : amount.toLocaleString('id-ID');
            calculate();
        }

        function clearTerima() {
            inputTerima.value = '';
            handleMainInput();
            calculate();
        }

        // --- Modal Split ---
        function openSplitModal() {
            const total = getRawValue(inputTotal.value);
            modalTotalDisplay.innerText = "Rp " + total.toLocaleString('id-ID');
            let half = Math.floor(total / 2);
            let remainder = total - half;
            splitAmount1.value = half > 0 ? half.toLocaleString('id-ID') : '';
            splitAmount2.value = remainder > 0 ? remainder.toLocaleString('id-ID') : '';
            modalOverlay.classList.add('active');
        }

        function syncSplitAmounts(changedField) {
            const total = getRawValue(inputTotal.value);
            const v1 = getRawValue(splitAmount1.value);
            const v2 = getRawValue(splitAmount2.value);
            if (changedField === 1) {
                let remainder = total - v1;
                splitAmount2.value = remainder > 0 ? remainder.toLocaleString('id-ID') : '0';
            } else if (changedField === 2) {
                let remainder = total - v2;
                splitAmount1.value = remainder > 0 ? remainder.toLocaleString('id-ID') : '0';
            }
        }

        function closeSplitModal(isCancel = false) {
            modalOverlay.classList.remove('active');
            if (isCancel) {
                document.getElementById('payTunai').checked = true;
                isSplitActive = false;
                calculate();
            }
        }

        function applySplit() {
            const v1 = getRawValue(splitAmount1.value);
            const v2 = getRawValue(splitAmount2.value);
            isSplitActive = true;
            splitData = { m1: splitMethod1.value, v1: v1, m2: splitMethod2.value, v2: v2 };
            inputTerima.value = (v1 + v2).toLocaleString('id-ID');
            closeSplitModal();
            calculate();
        }

        // --- Kalkulator Utama ---
        function calculate() {
            const total = getRawValue(inputTotal.value);
            const terima = getRawValue(inputTerima.value);
            displayTotal.innerText = "Rp " + total.toLocaleString('id-ID');

            if (total === 0 && terima === 0) { resetSummary(); return; }

            if (isSplitActive) {
                statusResult.innerText = `Split: ${splitData.m1} (Rp ${splitData.v1.toLocaleString('id-ID')}) + ${splitData.m2} (Rp ${splitData.v2.toLocaleString('id-ID')})`;
                statusResult.className = "status-result text-green";
                btnSaveTx.disabled = total <= 0;
                return;
            }

            if (terima === 0) {
                statusResult.innerText = "-";
                statusResult.className = "status-result text-neutral";
                btnSaveTx.disabled = true;
                return;
            }

            const selisih = terima - total;
            if (selisih >= 0) {
                statusResult.innerText = "Kembali: Rp " + selisih.toLocaleString('id-ID');
                statusResult.className = "status-result text-green";
                btnSaveTx.disabled = false;
            } else {
                statusResult.innerText = "Kurang: Rp " + Math.abs(selisih).toLocaleString('id-ID');
                statusResult.className = "status-result text-red";
                btnSaveTx.disabled = true;
            }
        }

        // --- Penyimpanan Transaksi ---
        function saveTransaction() {
            const total = getRawValue(inputTotal.value);
            if (total <= 0) return;

            let tunaiPortion = 0, qrisPortion = 0, methodLabel = "";

            if (isSplitActive) {
                methodLabel = "Split";
                if (splitData.m1 === 'Tunai') tunaiPortion += splitData.v1; else qrisPortion += splitData.v1;
                if (splitData.m2 === 'Tunai') tunaiPortion += splitData.v2; else qrisPortion += splitData.v2;
            } else {
                const method = document.querySelector('input[name="payment"]:checked').value;
                methodLabel = method;
                if (method === 'Tunai') tunaiPortion = total; else qrisPortion = total;
            }

            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

            const currentTx = { id: Date.now(), total: total, method: methodLabel, tunai: tunaiPortion, qris: qrisPortion, time: timeStr };

            transactions.unshift(currentTx);
            localStorage.setItem('kasir_transactions', JSON.stringify(transactions));

            resetForm();
            updateReportUI();
            if(!reportHeader.classList.contains('active')) toggleReportSection();
        }

        function updateReportUI() {
            let totalOmzet = 0, totalTunai = 0, totalQris = 0, listHTML = "";

            transactions.forEach(tx => {
                totalOmzet += tx.total; totalTunai += tx.tunai; totalQris += tx.qris;
                listHTML += `
                    <div class="history-item">
                        <div class="item-meta">
                            <span class="item-amount">Rp ${tx.total.toLocaleString('id-ID')}</span>
                            <span class="item-time">${tx.time} WIB</span>
                        </div>
                        <span class="item-method">${tx.method}</span>
                    </div>
                `;
            });

            document.getElementById('omzetTotal').innerText = "Rp " + totalOmzet.toLocaleString('id-ID');
            document.getElementById('omzetTunai').innerText = "Rp " + totalTunai.toLocaleString('id-ID');
            document.getElementById('omzetQris').innerText = "Rp " + totalQris.toLocaleString('id-ID');
            
            historyList.innerHTML = listHTML || `<div style="text-align:center; padding: 20px 0; font-size:0.8rem; color:var(--text-muted);">Belum ada penjualan.</div>`;
        }

        function toggleReportSection() {
            reportHeader.classList.toggle('active');
            reportContent.classList.toggle('show');
            if(reportContent.classList.contains('show')) {
                setTimeout(() => { reportContent.scrollTop = reportContent.scrollHeight; }, 100);
            }
        }

        function clearHistory() {
            if (transactions.length === 0) return alert("Belum ada data untuk dihapus.");
            const confirmText = prompt('⚠️ PERINGATAN: Data omzet akan di-reset.\n\nKetik "HAPUS" untuk mengonfirmasi:');
            
            if (confirmText === 'HAPUS') {
                transactions = [];
                localStorage.removeItem('kasir_transactions');
                updateReportUI();
                alert('Data pembukuan berhasil dikosongkan.');
            } else if (confirmText !== null) {
                alert('Kata kunci salah. Penghapusan dibatalkan.');
            }
        }

        function resetSummary() {
            displayTotal.innerText = "Rp 0";
            statusResult.innerText = "-";
            statusResult.className = "status-result text-neutral";
            btnSaveTx.disabled = true;
        }

        function resetForm() {
            inputTotal.value = '';
            inputTerima.value = '';
            document.getElementById('payTunai').checked = true;
            isSplitActive = false;
            resetSummary();
        }
    </script>
</body>
</html>
