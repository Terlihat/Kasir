<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir Pintar Pro v1.4.0</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    
    <style>
        /* --- CSS Variables untuk Tema --- */
        :root {
            --bg-color: #f4f6f8;
            --surface-color: #ffffff;
            --modal-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #1877f2;
            --primary-hover: #166fe5;
            --success: #00d26a;
            --danger: #ff4d4f;
            --border: #e2e8f0;
            --btn-bg: #edf2f7;
            --btn-text: #2d3748;
            --status-bg: #f8f9fa;
            --card-report-bg: #f8f9fa;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1c;
            --surface-color: #222225;
            --modal-bg: #222225;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #1976d2; 
            --primary-hover: #1565c0;
            --success: #4ade80; 
            --danger: #ef4444;
            --border: #333336;
            --btn-bg: #2d2d31;
            --btn-text: #e5e7eb;
            --status-bg: #1e1e20;
            --card-report-bg: #1a1a1c;
        }

        /* --- Reset & Base Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background-color: var(--surface-color);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- Header --- */
        header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .header-title h1 { font-size: 1.1rem; font-weight: 700; }
        .header-title span { font-size: 0.75rem; color: var(--text-muted); }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-main);
            padding: 6px;
            border-radius: 50%;
            transition: background-color 0.2s, transform 0.2s;
        }
        .theme-toggle:hover { background-color: var(--btn-bg); transform: scale(1.1); }

        /* --- Main Input Area --- */
        main {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-box {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 16px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.15); }
        .input-box::placeholder { color: var(--text-muted); font-weight: 600; font-size: 1rem; }

        /* --- Payment Options --- */
        .payment-methods { display: flex; flex-direction: column; gap: 12px; }
        .payment-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .payment-methods input[type="radio"] { display: none; }

        .payment-label {
            text-align: center;
            padding: 12px 8px;
            background-color: transparent;
            color: var(--btn-text);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .payment-label:hover { background-color: var(--btn-bg); border-color: var(--text-muted); }

        .payment-methods input[type="radio"]:checked + .payment-label {
            background-color: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }
        .payment-methods input[type="radio"]:checked + .payment-label:hover { background-color: var(--primary-hover); }

        .split-label { display: flex; justify-content: center; align-items: center; gap: 6px; background-color: #161e2e; border-color: #1f2937; color: var(--primary); }
        .split-label:hover { background-color: #1e293b; }

        /* --- Quick Amounts --- */
        .quick-amounts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
        .btn-quick {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: none;
            padding: 12px 0;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-quick:hover { background-color: var(--border); filter: brightness(1.15); }
        .btn-quick:active { transform: scale(0.97); }
        .btn-clear { color: var(--danger); background-color: #2a1a1c; }
        .btn-clear:hover { background-color: #3d2225; }

        /* --- Summary & Action Buttons --- */
        .summary-section {
            padding: 20px;
            border-top: 1px solid var(--border);
            background-color: var(--surface-color);
        }

        .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .total-label { font-size: 1rem; font-weight: 800; text-transform: uppercase; }
        .total-value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

        .status-box { display: flex; justify-content: space-between; align-items: center; padding: 16px; background-color: var(--status-bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px;}
        .status-label { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
        .status-result { font-size: 1rem; font-weight: 700; text-align: right; }

        .text-green { color: var(--success); }
        .text-red { color: var(--danger); }
        .text-neutral { color: var(--text-muted); }

        .action-buttons { display: flex; flex-direction: column; gap: 10px; }
        .btn-action {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }
        
        .btn-save { background-color: var(--success); color: #101012; }
        .btn-save:hover { filter: brightness(1.1); box-shadow: 0 4px 12px rgba(0, 210, 106, 0.2); }
        .btn-save:disabled { background-color: var(--btn-bg); color: var(--text-muted); cursor: not-allowed; box-shadow: none; filter: none; }
        
        .btn-reset { background-color: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-reset:hover { background-color: #2a1a1c; color: var(--danger); border-color: var(--danger); }

        /* --- Dashboard Laporan & Riwayat Pro --- */
        .report-section {
            border-top: 4px solid var(--border);
            background-color: var(--surface-color);
            margin-top: auto;
        }

        .report-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background-color: var(--status-bg);
            transition: background-color 0.2s;
        }
        .report-header:hover { background-color: var(--btn-bg); }
        .report-title { font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .report-toggle-icon { font-size: 0.8rem; color: var(--text-muted); transition: transform 0.2s; }
        .report-header.active .report-toggle-icon { transform: rotate(180deg); }

        .report-content {
            display: none;
            padding: 20px;
            flex-direction: column;
            gap: 16px;
            max-height: 320px;
            overflow-y: auto;
            border-top: 1px solid var(--border);
        }
        .report-content.show { display: flex; }

        .report-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .report-card { background-color: var(--card-report-bg); border: 1px solid var(--border); padding: 10px; border-radius: 6px; text-align: center; }
        .card-label { display: block; font-size: 0.7rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .card-value { font-size: 0.85rem; font-weight: 800; }

        .history-container { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
        .history-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        
        .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 140px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px; border-bottom: 1px dashed var(--border); font-size: 0.85rem; }
        .history-item:last-child { border-bottom: none; }
        
        .item-meta { display: flex; flex-direction: column; }
        .item-time { font-size: 0.7rem; color: var(--text-muted); }
        .item-method { font-size: 0.7rem; font-weight: 700; color: var(--primary); }
        .item-amount { font-weight: 700; }

        .btn-clear-history {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px dashed var(--border);
            padding: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }
        .btn-clear-history:hover { background-color: #2a1a1c; color: var(--danger); border-color: var(--danger); }

        /* --- Split Payment Modal --- */
        .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.75); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { width: 100%; background-color: var(--modal-bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; gap: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
        .modal-title { font-weight: 800; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .modal-title-icon { color: var(--primary); }
        .modal-total { font-weight: 800; font-size: 1.25rem; color: var(--primary); }
        .split-box { border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
        .split-box label { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block;}
        .split-inputs { display: flex; gap: 8px; }
        .split-select { width: 35%; background-color: var(--bg-color); color: var(--text-main); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 0.9rem; font-weight: 600; outline: none; }
        .split-input { width: 65%; background-color: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 10px 12px; font-size: 1.1rem; font-weight: bold; border-radius: 6px; outline: none; }
        .modal-actions { display: flex; gap: 12px; margin-top: 8px; }
        .modal-actions button { flex: 1; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; border: none; transition: all 0.2s ease; }
        .btn-modal-cancel { background-color: var(--btn-bg); color: var(--text-main); }
        .btn-modal-cancel:hover { background-color: var(--border); filter: brightness(0.9); }
        .btn-modal-apply { background-color: var(--primary); color: white; }
        .btn-modal-apply:hover { background-color: var(--primary-hover); box-shadow: 0 4px 12px rgba(25, 118, 210, 0.3); }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="header-title">
                <h1>Kasir Pintar</h1>
                <span>v1.4.0 (Pro)</span>
            </div>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️</button>
        </header>

        <!-- Main Content Inputs -->
        <main>
            <div class="form-group">
                <label>Total Belanja</label>
                <input type="text" id="totalBelanja" class="input-box" inputmode="numeric" placeholder="0" oninput="formatInput(this); handleMainInput(); calculate()">
            </div>

            <div class="payment-methods">
                <div class="payment-row">
                    <div>
                        <input type="radio" id="payTunai" name="payment" value="Tunai" checked onchange="handlePaymentChange()">
                        <label for="payTunai" class="payment-label" style="display:block;">Tunai</label>
                    </div>
                    <div>
                        <input type="radio" id="payQris" name="payment" value="QRIS" onchange="handlePaymentChange()">
                        <label for="payQris" class="payment-label" style="display:block;">QRIS/Debit</label>
                    </div>
                </div>
                <div>
                    <input type="radio" id="paySplit" name="payment" value="Split" onchange="handlePaymentChange()">
                    <label for="paySplit" class="payment-label split-label" style="display:flex;">
                        <span style="font-size:1.1rem;">🔀</span> Split Payment
                    </label>
                </div>
            </div>

            <div class="form-group" style="margin-top: 10px;">
                <input type="text" id="uangDiterima" class="input-box" inputmode="numeric" placeholder="Uang Diterima (Rp)" oninput="formatInput(this); handleMainInput(); calculate()">
                
                <div class="quick-amounts">
                    <button class="btn-quick" onclick="setQuickAmount('pas')">Uang Pas</button>
                    <button class="btn-quick" onclick="setQuickAmount(5000)">5K</button>
                    <button class="btn-quick" onclick="setQuickAmount(10000)">10K</button>
                    <button class="btn-quick" onclick="setQuickAmount(20000)">20K</button>
                    <button class="btn-quick" onclick="setQuickAmount(50000)">50K</button>
                    <button class="btn-quick" onclick="setQuickAmount(75000)">75K</button>
                    <button class="btn-quick" onclick="setQuickAmount(100000)">100K</button>
                    <button class="btn-quick btn-clear" onclick="clearTerima()">C</button>
                </div>
            </div>
        </main>

        <!-- Summary Section -->
        <div class="summary-section">
            <div class="total-row">
                <span class="total-label">TOTAL</span>
                <span class="total-value" id="displayTotal">Rp 0</span>
            </div>
            <div class="status-box">
                <span class="status-label">Status</span>
                <span class="status-result text-neutral" id="statusResult">-</span>
            </div>
            
            <div class="action-buttons">
                <button class="btn-action btn-save" id="btnSaveTx" onclick="saveTransaction()" disabled>Simpan Transaksi</button>
                <button class="btn-action btn-reset" onclick="resetForm()">Reset Form</button>
            </div>
        </div>

        <!-- Dashboard Laporan & Riwayat Penjualan (Pro Feature) -->
        <div class="report-section">
            <div class="report-header" id="reportHeader" onclick="toggleReportSection()">
                <span class="report-title">📊 Pembukuan & Riwayat Hari Ini</span>
                <span class="report-toggle-icon" id="reportIcon">▲</span>
            </div>
            <div class="report-content" id="reportContent">
                <div class="report-grid">
                    <div class="report-card">
                        <span class="card-label">Omzet</span>
                        <span class="card-value text-green" id="omzetTotal">Rp 0</span>
                    </div>
                    <div class="report-card">
                        <span class="card-label">Kas Tunai</span>
                        <span class="card-value" id="omzetTunai">Rp 0</span>
                    </div>
                    <div class="report-card">
                        <span class="card-label">Uang QRIS</span>
                        <span class="card-value" id="omzetQris">Rp 0</span>
                    </div>
                </div>
                <div class="history-container">
                    <span class="history-label">Daftar Transaksi</span>
                    <div class="history-list" id="historyList">
                        <!-- Item riwayat di-generate via JavaScript -->
                    </div>
                </div>
                <button class="btn-clear-history" onclick="clearHistory()">Hapus Semua Pembukuan</button>
            </div>
        </div>

        <!-- Split Payment Modal -->
        <div id="splitModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-title"><span class="modal-title-icon">🔀</span> SPLIT PAYMENT</div>
                    <div class="modal-total" id="modalTotalDisplay">Rp 0</div>
                </div>

                <div class="split-box">
                    <label>Pembayaran Pertama</label>
                    <div class="split-inputs">
                        <select id="splitMethod1" class="split-select">
                            <option value="Tunai">Tunai</option>
                            <option value="QRIS">QRIS</option>
                        </select>
                        <input type="text" id="splitAmount1" class="split-input" inputmode="numeric" placeholder="0" oninput="formatInput(this); syncSplitAmounts(1)">
                    </div>
                </div>

                <div class="split-box">
                    <label>Pembayaran Kedua</label>
                    <div class="split-inputs">
                        <select id="splitMethod2" class="split-select">
                            <option value="QRIS" selected>QRIS</option>
                            <option value="Tunai">Tunai</option>
                        </select>
                        <input type="text" id="splitAmount2" class="split-input" inputmode="numeric" placeholder="0" oninput="formatInput(this); syncSplitAmounts(2)">
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="btn-modal-cancel" onclick="closeSplitModal(true)">Batal</button>
                    <button class="btn-modal-apply" onclick="applySplit()">Terapkan Split</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Script Logika -->
    <script>
        // --- Tema Setup ---
        const html = document.documentElement;
        const themeToggleBtn = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        function toggleTheme() {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) { themeToggleBtn.innerText = theme === 'dark' ? '☀️' : '🌙'; }

        // --- DOM Elements ---
        const inputTotal = document.getElementById('totalBelanja');
        const inputTerima = document.getElementById('uangDiterima');
        const displayTotal = document.getElementById('displayTotal');
        const statusResult = document.getElementById('statusResult');
        const btnSaveTx = document.getElementById('btnSaveTx');
        
        // Modal & Dashboard Elements
        const modalOverlay = document.getElementById('splitModal');
        const modalTotalDisplay = document.getElementById('modalTotalDisplay');
        const splitAmount1 = document.getElementById('splitAmount1');
        const splitAmount2 = document.getElementById('splitAmount2');
        const splitMethod1 = document.getElementById('splitMethod1');
        const splitMethod2 = document.getElementById('splitMethod2');
        
        const reportHeader = document.getElementById('reportHeader');
        const reportContent = document.getElementById('reportContent');
        const historyList = document.getElementById('historyList');

        // State Global Pro
        let isSplitActive = false;
        let splitData = { m1: '', v1: 0, m2: '', v2: 0 };
        let transactions = JSON.parse(localStorage.getItem('kasir_transactions')) || [];

        // Inisialisasi Tampilan Laporan Penjualan saat pertama buka
        updateReportUI();

        // --- Utilities ---
        function formatInput(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            input.value = value !== '' ? parseInt(value, 10).toLocaleString('id-ID') : '';
        }

        function getRawValue(str) {
            return str ? parseInt(str.replace(/[^0-9]/g, ''), 10) || 0 : 0;
        }

        // --- Interaksi Utama ---
        function handlePaymentChange() {
            const method = document.querySelector('input[name="payment"]:checked').value;
            if (method === 'Split') { openSplitModal(); } 
            else {
                isSplitActive = false;
                if (method === 'QRIS') setQuickAmount('pas');
                else calculate();
            }
        }

        function handleMainInput() {
            if (isSplitActive) {
                isSplitActive = false;
                document.getElementById('payTunai').checked = true;
            }
        }

        function setQuickAmount(amount) {
            handleMainInput();
            let total = getRawValue(inputTotal.value);
            inputTerima.value = amount === 'pas' ? total.toLocaleString('id-ID') : amount.toLocaleString('id-ID');
            calculate();
        }

        function clearTerima() {
            inputTerima.value = '';
            handleMainInput();
            calculate();
        }

        // --- Logic Auto-Balancing Split (Screenshot 2026-06-18 032814.png) ---
        function openSplitModal() {
            const total = getRawValue(inputTotal.value);
            modalTotalDisplay.innerText = "Rp " + total.toLocaleString('id-ID');
            let half = Math.floor(total / 2);
            let remainder = total - half;
            splitAmount1.value = half > 0 ? half.toLocaleString('id-ID') : '';
            splitAmount2.value = remainder > 0 ? remainder.toLocaleString('id-ID') : '';
            modalOverlay.classList.add('active');
        }

        function syncSplitAmounts(changedField) {
            const total = getRawValue(inputTotal.value);
            const v1 = getRawValue(splitAmount1.value);
            const v2 = getRawValue(splitAmount2.value);

            if (changedField === 1) {
                let remainder = total - v1;
                if (remainder < 0) remainder = 0;
                splitAmount2.value = remainder > 0 ? remainder.toLocaleString('id-ID') : '0';
            } else if (changedField === 2) {
                let remainder = total - v2;
                if (remainder < 0) remainder = 0;
                splitAmount1.value = remainder > 0 ? remainder.toLocaleString('id-ID') : '0';
            }
        }

        function closeSplitModal(isCancel = false) {
            modalOverlay.classList.remove('active');
            if (isCancel) {
                document.getElementById('payTunai').checked = true;
                isSplitActive = false;
                calculate();
            }
        }

        function applySplit() {
            const v1 = getRawValue(splitAmount1.value);
            const v2 = getRawValue(splitAmount2.value);
            isSplitActive = true;
            splitData = { m1: splitMethod1.value, v1: v1, m2: splitMethod2.value, v2: v2 };
            inputTerima.value = (v1 + v2).toLocaleString('id-ID');
            closeSplitModal();
            calculate();
        }

        // --- Kalkulator Utama & Validasi Tombol Simpan ---
        function calculate() {
            const total = getRawValue(inputTotal.value);
            const terima = getRawValue(inputTerima.value);
            displayTotal.innerText = "Rp " + total.toLocaleString('id-ID');

            if (total === 0 && terima === 0) {
                resetSummary();
                return;
            }

            if (isSplitActive) {
                statusResult.innerText = `Split: ${splitData.m1} (Rp ${splitData.v1.toLocaleString('id-ID')}) + ${splitData.m2} (Rp ${splitData.v2.toLocaleString('id-ID')})`;
                statusResult.className = "status-result text-green";
                btnSaveTx.disabled = total <= 0; // Aktifkan tombol jika split bernilai valid
                return;
            }

            if (terima === 0) {
                statusResult.innerText = "-";
                statusResult.className = "status-result text-neutral";
                btnSaveTx.disabled = true;
                return;
            }

            const selisih = terima - total;
            if (selisih >= 0) {
                statusResult.innerText = "Kembali: Rp " + selisih.toLocaleString('id-ID');
                statusResult.className = "status-result text-green";
                btnSaveTx.disabled = false; // Transaksi valid (Lunas/Lebih)
            } else {
                statusResult.innerText = "Kurang: Rp " + Math.abs(selisih).toLocaleString('id-ID');
                statusResult.className = "status-result text-red";
                btnSaveTx.disabled = true; // Pembayaran kurang, matikan simpan
            }
        }

        // --- Pro Feature: Logika Pembukuan & Penyimpanan ---
        function saveTransaction() {
            const total = getRawValue(inputTotal.value);
            if (total <= 0) return;

            let tunaiPortion = 0;
            let qrisPortion = 0;
            let methodLabel = "";

            if (isSplitActive) {
                methodLabel = "Split";
                if (splitData.m1 === 'Tunai') tunaiPortion += splitData.v1; else qrisPortion += splitData.v1;
                if (splitData.m2 === 'Tunai') tunaiPortion += splitData.v2; else qrisPortion += splitData.v2;
            } else {
                const method = document.querySelector('input[name="payment"]:checked').value;
                methodLabel = method;
                if (method === 'Tunai') tunaiPortion = total; else qrisPortion = total;
            }

            // Atur Waktu Transaksi (Format Jam 2026)
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

            // Model Objek Data Transaksi
            const currentTx = {
                id: Date.now(),
                total: total,
                method: methodLabel,
                tunai: tunaiPortion,
                qris: qrisPortion,
                time: timeStr
            };

            transactions.unshift(currentTx); // Simpan di urutan paling atas riwayat
            localStorage.setItem('kasir_transactions', JSON.stringify(transactions));

            // Feedback visual sukses & bersihkan form otomatis
            resetForm();
            updateReportUI();
            
            // Otomatis bentangkan laporan ke atas saat transaksi baru masuk agar kasir tahu data tercatat
            if(!reportHeader.classList.contains('active')) toggleReportSection();
        }

        function updateReportUI() {
            let totalOmzet = 0;
            let totalTunai = 0;
            let totalQris = 0;
            let listHTML = "";

            transactions.forEach(tx => {
                totalOmzet += tx.total;
                totalTunai += tx.tunai;
                totalQris += tx.qris;

                listHTML += `
                    <div class="history-item">
                        <div class="item-meta">
                            <span class="item-amount">Rp ${tx.total.toLocaleString('id-ID')}</span>
                            <span class="item-time">${tx.time} WIB</span>
                        </div>
                        <span class="item-method">${tx.method}</span>
                    </div>
                `;
            });

            // Pasang hasil kalkulasi ke Elemen Dashboard
            document.getElementById('omzetTotal').innerText = "Rp " + totalOmzet.toLocaleString('id-ID');
            document.getElementById('omzetTunai').innerText = "Rp " + totalTunai.toLocaleString('id-ID');
            document.getElementById('omzetQris').innerText = "Rp " + totalQris.toLocaleString('id-ID');
            
            historyList.innerHTML = listHTML || `<div style="text-align:center; padding: 20px 0; font-size:0.8rem; color:var(--text-muted);">Belum ada penjualan hari ini.</div>`;
        }

        function toggleReportSection() {
            reportHeader.classList.toggle('active');
            reportContent.classList.toggle('show');
        }

        function clearHistory() {
            if (confirm("Apakah Anda yakin ingin menghapus seluruh data pembukuan dan riwayat transaksi? Data tidak bisa dikembalikan.")) {
                transactions = [];
                localStorage.removeItem('kasir_transactions');
                updateReportUI();
            }
        }

        function resetSummary() {
            displayTotal.innerText = "Rp 0";
            statusResult.innerText = "-";
            statusResult.className = "status-result text-neutral";
            btnSaveTx.disabled = true;
        }

        function resetForm() {
            inputTotal.value = '';
            inputTerima.value = '';
            document.getElementById('payTunai').checked = true;
            isSplitActive = false;
            resetSummary();
        }
    </script>
</body>
</html>
