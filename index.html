<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir Pintar v1.1.0</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    
    <style>
        /* --- CSS Variables untuk Tema --- */
        :root {
            /* Light Theme */
            --bg-color: #f4f6f8;
            --surface-color: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #1877f2;
            --primary-hover: #166fe5;
            --success: #00d26a;
            --danger: #ff4d4f;
            --border: #e2e8f0;
            --btn-bg: #edf2f7;
            --btn-text: #2d3748;
            --status-bg: #f8f9fa;
        }

        [data-theme="dark"] {
            /* Dark Theme (Disesuaikan dengan Screenshot) */
            --bg-color: #1a1a1c;
            --surface-color: #222225;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #1976d2; 
            --primary-hover: #1565c0;
            --success: #4ade80; 
            --danger: #ef4444;
            --border: #333336;
            --btn-bg: #2d2d31;
            --btn-text: #e5e7eb;
            --status-bg: #1e1e20;
        }

        /* --- Reset & Base Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background-color: var(--surface-color);
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .header-title h1 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .header-title span {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-main);
        }

        /* --- Main Content --- */
        main {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Input Styles */
        .input-box {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 16px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-box:focus {
            border-color: var(--primary);
        }

        /* --- Payment Methods (Sesuai Referensi Gambar) --- */
        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .payment-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .payment-methods input[type="radio"] {
            display: none;
        }

        .payment-label {
            text-align: center;
            padding: 12px 8px;
            background-color: transparent;
            color: var(--btn-text);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* Active State Payment */
        .payment-methods input[type="radio"]:checked + .payment-label {
            background-color: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }

        .split-label {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            background-color: #161e2e; /* Khusus split payment agak biru gelap */
            border-color: #1f2937;
            color: var(--primary);
        }

        /* --- Quick Amounts (4 Kolom) --- */
        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .btn-quick {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: none;
            padding: 10px 0;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-quick:active {
            background-color: var(--border);
        }

        .btn-clear {
            color: var(--danger);
            background-color: #2a1a1c; /* Aksen merah sangat gelap untuk C */
        }

        /* --- Summary Section (Bawah) --- */
        .summary-section {
            padding: 20px;
            border-top: 1px solid var(--border);
            background-color: var(--surface-color);
            margin-top: auto;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .total-label {
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .total-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .status-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-color: var(--status-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .status-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .status-result {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .text-green { color: var(--success); }
        .text-red { color: var(--danger); }
        .text-neutral { color: var(--text-muted); }

        .btn-reset {
            width: 100%;
            padding: 14px;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
        }
        
        .btn-reset:active {
            background-color: var(--border);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="header-title">
                <h1>Kasir Pintar</h1>
                <span>v1.1.0</span>
            </div>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️</button>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Input Total Belanja -->
            <div class="form-group">
                <label>Total Belanja</label>
                <input type="text" id="totalBelanja" class="input-box" inputmode="numeric" placeholder="0" oninput="formatInput(this); calculate()">
            </div>

            <!-- Metode Pembayaran (Redesain) -->
            <div class="payment-methods">
                <div class="payment-row">
                    <div>
                        <input type="radio" id="payTunai" name="payment" value="Tunai" checked onchange="handlePaymentChange()">
                        <label for="payTunai" class="payment-label" style="display:block;">Tunai</label>
                    </div>
                    <div>
                        <input type="radio" id="payQris" name="payment" value="QRIS" onchange="handlePaymentChange()">
                        <label for="payQris" class="payment-label" style="display:block;">QRIS/Debit</label>
                    </div>
                </div>
                <div>
                    <input type="radio" id="paySplit" name="payment" value="Split" onchange="handlePaymentChange()">
                    <label for="paySplit" class="payment-label split-label" style="display:flex;">
                        <span>🔀</span> Split Payment
                    </label>
                </div>
            </div>

            <!-- Area Input Uang Diterima -->
            <div class="form-group" style="margin-top: 10px;">
                <input type="text" id="uangDiterima" class="input-box" inputmode="numeric" placeholder="0" oninput="formatInput(this); calculate()">
                
                <!-- Quick Amounts 4 Kolom -->
                <div class="quick-amounts">
                    <button class="btn-quick" onclick="setQuickAmount('pas')">Uang Pas</button>
                    <button class="btn-quick" onclick="setQuickAmount(5000)">5K</button>
                    <button class="btn-quick" onclick="setQuickAmount(10000)">10K</button>
                    <button class="btn-quick" onclick="setQuickAmount(20000)">20K</button>
                    
                    <button class="btn-quick" onclick="setQuickAmount(50000)">50K</button>
                    <button class="btn-quick" onclick="setQuickAmount(75000)">75K</button>
                    <button class="btn-quick" onclick="setQuickAmount(100000)">100K</button>
                    <button class="btn-quick btn-clear" onclick="clearTerima()">C</button>
                </div>
            </div>
        </main>

        <!-- Summary Section Sesuai Gambar -->
        <div class="summary-section">
            <div class="total-row">
                <span class="total-label">TOTAL</span>
                <span class="total-value" id="displayTotal">Rp 0</span>
            </div>

            <div class="status-box">
                <span class="status-label">Status</span>
                <span class="status-result text-neutral" id="statusResult">-</span>
            </div>

            <button class="btn-reset" onclick="resetForm()">Reset Transaksi</button>
        </div>
    </div>

    <!-- Script Logika -->
    <script>
        // --- Tema Setup ---
        const html = document.documentElement;
        const themeToggleBtn = document.getElementById('themeToggle');
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        function toggleTheme() {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            themeToggleBtn.innerText = theme === 'dark' ? '☀️' : '🌙';
        }

        // --- Logika Kasir ---
        const inputTotal = document.getElementById('totalBelanja');
        const inputTerima = document.getElementById('uangDiterima');
        const displayTotal = document.getElementById('displayTotal');
        const statusResult = document.getElementById('statusResult');

        function formatInput(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            if (value !== '') {
                input.value = parseInt(value, 10).toLocaleString('id-ID');
            } else {
                input.value = '';
            }
        }

        function getRawValue(str) {
            if (!str) return 0;
            return parseInt(str.replace(/[^0-9]/g, ''), 10) || 0;
        }

        function handlePaymentChange() {
            const method = document.querySelector('input[name="payment"]:checked').value;
            if (method === 'QRIS') {
                setQuickAmount('pas');
            }
        }

        function setQuickAmount(amount) {
            let total = getRawValue(inputTotal.value);
            
            if (amount === 'pas') {
                inputTerima.value = total.toLocaleString('id-ID');
            } else {
                inputTerima.value = amount.toLocaleString('id-ID');
            }
            calculate();
        }

        function clearTerima() {
            inputTerima.value = '';
            calculate();
        }

        function calculate() {
            const total = getRawValue(inputTotal.value);
            const terima = getRawValue(inputTerima.value);
            
            // Update UI Teks Biru Total
            displayTotal.innerText = "Rp " + total.toLocaleString('id-ID');

            if (total === 0 && terima === 0) {
                resetSummary();
                return;
            }

            if (terima === 0) {
                statusResult.innerText = "-";
                statusResult.className = "status-result text-neutral";
                return;
            }

            const selisih = terima - total;

            if (selisih >= 0) {
                statusResult.innerText = "Kembali: Rp " + selisih.toLocaleString('id-ID');
                statusResult.className = "status-result text-green";
            } else {
                statusResult.innerText = "Kurang: Rp " + Math.abs(selisih).toLocaleString('id-ID');
                statusResult.className = "status-result text-red";
            }
        }

        function resetSummary() {
            displayTotal.innerText = "Rp 0";
            statusResult.innerText = "-";
            statusResult.className = "status-result text-neutral";
        }

        function resetForm() {
            inputTotal.value = '';
            inputTerima.value = '';
            document.getElementById('payTunai').checked = true;
            resetSummary();
        }
    </script>
</body>
</html>
